version: '3.8'

services:
  neobrain:
    build: .
    container_name: neobrain-jetson
    privileged: true
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/app
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8080:8080"
    command: python src/core/brain.py
    restart: unless-stopped
